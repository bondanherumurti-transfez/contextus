services:
  - type: web
    name: contextus-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL_PROFILE
        value: anthropic/claude-3-haiku
      - key: MODEL_CHAT
        value: anthropic/claude-sonnet-4
      - key: MODEL_BRIEF
        value: anthropic/claude-sonnet-4
      - key: SITE_URL
        value: https://project-b0yme.vercel.app
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://project-b0yme.vercel.app
