services:
  - type: web
    name: contextus-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL_PROFILE
        value: anthropic/claude-3-haiku
      - key: MODEL_CHAT
        value: anthropic/claude-sonnet-4
      - key: MODEL_BRIEF
        value: anthropic/claude-sonnet-4
      - key: SITE_URL
        value: https://getcontextus.dev
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://getcontextus.dev,https://www.getcontextus.dev,https://project-b0yme.vercel.app

  - type: cron
    name: process-sessions-cron
    runtime: python
    schedule: "*/15 * * * *"
    startCommand: >-
      curl -sf --max-time 30
      -X POST https://contextus-2d16.onrender.com/api/jobs/process-sessions
      -H "x-cron-secret: $CRON_SECRET"
    envVars:
      - key: CRON_SECRET
        sync: false
