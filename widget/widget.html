<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <title>contextus</title>
  <link rel="stylesheet" href="widget.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #ffffff; }
    body.transparent { background: transparent; }
    #contextus-root { width: 100%; }
  </style>
</head>
<body>
  <div id="contextus-root"></div>

  <script src="widget.js"></script>
  <script>
    (async function () {
      var params = new URLSearchParams(location.search);

      var transparent = params.get('transparent') === '1';
      if (transparent) document.body.classList.add('transparent');

      var apiUrl = params.get('apiUrl') || '';
      var knowledgeBaseId = params.get('knowledgeBaseId') || '';
      var providedSessionId = params.get('sessionId') || '';
      var pills = null;

      var autoMessage = params.get('autoMessage') || '';

      if (providedSessionId) {
        window.__ctxSessionId = providedSessionId;
        window.parent.postMessage({ type: 'contextus:session_ready', session_id: providedSessionId }, '*');
      } else if (apiUrl && knowledgeBaseId) {
        try {
          var sr = await fetch(apiUrl + '/api/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ knowledge_base_id: knowledgeBaseId }),
          });
          if (sr.ok) {
            var data = await sr.json();
            window.__ctxSessionId = data.session_id;
            if (data.pills && data.pills.length) pills = data.pills;
            window.parent.postMessage({ type: 'contextus:session_ready', session_id: data.session_id }, '*');
          }
        } catch (e) { /* fall through to defaults */ }
      }

      var widget = ContextusWidget.init({
        root: document.getElementById('contextus-root'),
        name: params.get('name') || 'contextus',
        greeting: params.get('greeting') || 'Ask us anything...',
        lang: params.get('lang') || 'auto',
        transparent: transparent,
        dynamicHeight: params.get('dynamicHeight') === '1',
        apiUrl: apiUrl,
        knowledgeBaseId: knowledgeBaseId,
        pills: pills || ['What services do you offer?', 'How can you help me?', 'How do I contact you?'],
        autoMessage: autoMessage,
      });
    })();
  </script>
</body>
</html>
