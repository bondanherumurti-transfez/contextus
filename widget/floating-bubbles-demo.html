<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Widget — Bubbles Demo</title>
</head>
<body style="background:#f8f8f8;min-height:100vh;padding:40px;">
  <h1 style="font-family:sans-serif;font-size:18px;margin-bottom:16px;">Bubbles appearance fixture</h1>
  <p style="font-family:sans-serif;font-size:13px;color:#888;">Floating widget with data-appearance="bubbles". Used by Playwright tests.</p>
</body>

<!-- Floating widget — bubbles mode -->
<script
  id="ctxf-script"
  src="./floating.js"

  data-position="bottom-right"
  data-offset="20"
  data-color="#000000"
  data-lang="en"
  data-knowledge-base-id="demo-kb"
  data-appearance="bubbles"
></script>
